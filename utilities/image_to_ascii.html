<!DOCTYPE html>
<html>
<head>
    <title>Utilities</title>
    <base href="/">
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link href="static/css/main.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="static/images/favicon.ico" rel="icon">
    <script type="module" src="main.js" defer></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.11.2/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.11.2/core.js"></script>
    <py-config>packages = ['pillow']</py-config>
</head>
<body>
    <div id="mommy-container">
        <div id="body-3-col">
            <div id="left-sidebar">
                <img src="https://blob.gifcities.org/gifcities/LC62ZOWCYLCV363SK45YEHOJQDYRJCWS.gif" alt="">
            </div>
            <div id="center-bar">
                <div class="window" style="max-width: 700px;">
                    <div w3-include-html="templates/title_bar.html"></div>
                    <div class="window-body">
                        <div style="display: flex; gap: 10px; justify-content: space-between; align-items: center; height: 50px;">
                            <h3>ASCII Image Converter</h3>
                        </div>
                    </div>
                    <div w3-include-html="templates/navbar.html"></div>
                    <div class="window">
                        <div class="window-body">
                            <div w3-include-html="templates/utilities_navbar.html"></div>
                            <div class="window">
                                <div class="window-body">
                                    <div id="pyscript-loading"></div>
                                    <input type="file" id="file-input" accept="image/*">
                                    <label for="file-input" class="file-label">Select a file</label>
                                    <span>Width</span>
                                    <input type="range" id="width" class="slider" min="40" max="200" value="200">
                                    <span>Contrast</span>
                                    <input type="range" id="contrast" class="slider" min="0" max="200" value="100">
                                    <div style="display:flex; flex-wrap: wrap; gap:40px; margin: 20px 0;">
                                        <div class="tool-parameter">
                                            <label for="depth">Character Depth</label>
                                            <input type="number" id="depth" min=1 max=6 value=4>
                                        </div>
                                        <strong>Edge Behavior</strong>
                                        <div class="tool-parameter">
                                            <label for="detect-edges">None</label>
                                            <input type="radio" id="edge-none" name="edge-choice" checked>
                                        </div>
                                        <div class="tool-parameter">
                                            <label for="edge-detect">Detect</label>
                                            <input type="radio" id="edge-detect" name="edge-choice">
                                        </div>
                                        <div class="tool-parameter">
                                            <label for="edge-width">Enhance</label>
                                            <input type="radio" id="edge-enhance" name="edge-choice">
                                        </div>
                                    </div>
                                    <button py-click="run">Convert</button>
                                    <py-script src="static/python/image_to_ascii.py"></py-script>
                                    <pre id="ascii-output">No image to show.</pre>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="right-sidebar">
                <img src="https://blob.gifcities.org/gifcities/7KJSGRPZC4ACA2GJ4GKS47K6FELZ6536.gif" alt="">
                <img src="https://blob.gifcities.org/gifcities/6DRVVONRIYEZIXD5F6GQL4S5MTG6DFWY.gif" alt="">
                <img src="https://blob.gifcities.org/gifcities/JCHFAUQC5KLUBIIUI7QR4AL4YIXQNDWL.gif" alt="">
            </div>
        </div>
    </div>
</body>
</html>
