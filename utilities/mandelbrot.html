<!DOCTYPE html>
<html>
<head>
    <title>Utilities</title>
    <base href="/">
    <link href="static/css/main.css" rel="stylesheet">
    <link href="static/images/favicon.ico" rel="icon">
    <script type="module" src="main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <script src="static/javascript/mandelbrot.js" defer></script>
</head>

<body>
    <div w3-include-html="/templates/header.html"></div>
    <div class="utilities-content">
        <div class="utilities-layout">
            <div class="utilities-sidebar" w3-include-html="/templates/utilities_sidebar.html"></div>
            <div id="tool-container">
                <div id="sketch"></div>
                <label for="iterations">Max Iterations</label>
                <select name="iterations" id="iterations">
                    <option value="10">10</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="250">250</option>
                    <option value="500">500</option>
                    <option value="1000">1,000</option>
                    <option value="5000">5,000</option>
                    <option value="10000">10,000</option>
                </select>
                <label for="zoom">Zoom</label>
                <input type="range" name="zoom" id="zoom" class="slider" min=0.5 max=1000 step=0.0001 value=0.5>
                <label for="start-color">Start Color</label>
                <input type="range" name="start-color" id="start-color" class="slider" min=0 max=255 step=0.1 value=0>
                <label for="end-color">End Color</label>
                <input type="range" name="end-color" id="end-color" class="slider" min=0 max=255 step=0.1 value=255>
                <button id="save">Save Image</button>
            </div>
        </div>
    </div>
</body>




</html>
