<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <title>Gage Rowden</title>
        <link href="static/css/main.css" rel="stylesheet" type="text/css">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"> 
        <link href="static/images/favicon.ico" rel="icon" type="image/x-icon" >
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" >
        <script type="module" src="main.js" defer></script>
    </head>
    <body>
        <div class="header-container" w3-include-html="/templates/ganymede.html"></div>
        <a id="hamburger" onclick="toggleSidenav()">
            <i class="fa fa-bars"></i>
        </a>
        <sidenav w3-include-html="/templates/sidenav.html" id="sidenav"></sidenav>
        <div class="music">
            <div id="music-embeds">
                <!-- <iframe id="embed" data-testid="embed-iframe"  src="https://open.spotify.com/embed/artist/23DyBlyjDtXfYo333RBWj7?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe> -->
                <iframe id="embed" src="https://bandcamp.com/EmbeddedPlayer/album=1667975529/size=large/bgcol=333333/linkcol=2ebd35/tracklist=false/artwork=small/transparent=true/" seamless><a href="https://ganymede1.bandcamp.com/album/niche">niche by Ganymede</a></iframe>
                <iframe id="embed" src="https://bandcamp.com/EmbeddedPlayer/track=1102266078/size=large/bgcol=333333/linkcol=2ebd35/tracklist=false/artwork=small/transparent=true/" seamless><a href="https://ganymede1.bandcamp.com/track/channel-2-2">channel_2 by Ganymede</a></iframe>
                <iframe id="embed" src="https://bandcamp.com/EmbeddedPlayer/album=2316583675/size=large/bgcol=333333/linkcol=2ebd35/tracklist=false/artwork=small/transparent=true/" seamless><a href="https://ganymede1.bandcamp.com/album/generation-loss-2">Generation Loss by Ganymede</a></iframe>
            </div>
            <div class="music-container">
                <div class="audio-player"></div>
                <div id="visualizer">
                    <div>
                        <button id="toggle-scope">Mode</button>
                        <canvas id="oscilloscope"></canvas>
                    <ul id="visual-toggles">
                        <li><span>Stretch</span><input type="range" id="stretch-slider" class="slider" min="1" max="50" step="0.01" value="2"></li>
                        <li><span>Persistence</span><input type="range" id="persistence-slider" class="slider" min="0" max="1" step="0.001" value="0.4"></li>
                        <li><span>Draw Distance</span><input type="range" id="distance-slider" class="slider" min="0" max="0.1" step="0.001" value="0.09"></li>
                        <li><span>Scale</span><input type="range" id="scale-slider" class="slider" min="0" max="0.6" step="0.01" value="0.55"></li>
                        <li><span>Glow</span><input type="range" id="glow-slider" class="slider" min="0" max="10" step="0.01" value="6"></li>
                    </ul>
                    <ul id="toggle-values">
                        <li><span>Stretch: <val id="stretch-value" class="toggle-value"></val></val></span></li>
                        <li><span>Persistence: <val id="persistence-value"class="toggle-value"></val></span></li>
                        <li><span>Draw Distance: <val id="distance-value"class="toggle-value"></val></span></li>
                        <li><span>Scale: <val id="scale-value"class="toggle-value"></val></span></li>
                        <li><span>Glow: <val id="glow-value"class="toggle-value"></val></span></li>
                    </ul>
                </div>
            </div>
        </div>
    </body>
</html>
